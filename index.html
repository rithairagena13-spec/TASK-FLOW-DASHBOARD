<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <div class="controls">
        <h1>TaskFlow <em>Dashboard</em></h1>
        <input
            type="text"
            id="searchInput"
            placeholder="Search tasks..."
        >

        <select id="categoryFilter">
            <option value="all">All Priorities</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
        </select>

        <button id="themeToggle">🌙 Theme</button>
        <button id="openModal">+ New Task</button>
    </div>
</header>

<main class="board-wrapper">

    <section class="column">
        <h2>To Do</h2>
        <div class="task-list" id="todo"></div>
    </section>

    <section class="column">
        <h2>In Progress</h2>
        <div class="task-list" id="progress"></div>
    </section>

    <section class="column">
        <h2>Done</h2>
        <div class="task-list" id="done"></div>
    </section>

</main>

<section class="analytics">
    <h2>Productivity Analytics</h2>

    <div class="stats">
        <div class="stat-card">
            <h3>Total Tasks</h3>
            <p id="totalTasks">0</p>
        </div>

        <div class="stat-card">
            <h3>Completed Tasks</h3>
            <p id="completedTasks">0</p>
        </div>
    </div>
</section>

<div class="modal hidden" id="taskModal">

    <div class="modal-content">

        <h2>Create New Task</h2>

        <form id="taskForm">

            <input
                type="text"
                id="taskTitle"
                placeholder="Task Title"
                required
            >

            <select id="taskPriority">
                <option value="high">High Priority</option>
                <option value="medium">Medium Priority</option>
                <option value="low">Low Priority</option>
            </select>

            <div class="modal-buttons">
                <button type="submit">Add Task</button>
                <button type="button" id="closeModal">
                    Cancel
                </button>
            </div>

        </form>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
